<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to Japan — Account Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="supabase-client.js"></script>
<script src="gojuon-widget.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8FAFF;
  --bg2: #EEF2FF;
  --card: #FFFFFF;
  --card2: #F0F4FF;
  --border: rgba(0,87,168,0.12);
  --gold: #60A5FA;
  --gold2: #3B82F6;
  --red: #FF6B9D;
  --cyan: #38BDF8;
  --purple: #818CF8;
  --pink: #FF6B9D;
  --green: #34D399;
  --white: #1E293B;
  --gray: #64748B;
  --text: #1E293B;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* HEADER */
.top-header {
  position: sticky; top: 0; z-index: 100; height: 64px;
  background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,87,168,0.1);
  display: flex; align-items: center; padding: 0 20px; gap: 14px;
}
.header-logo {
  font-family: 'Bangers', cursive; font-size: 1.4rem; letter-spacing: 3px;
  background: linear-gradient(90deg, #60A5FA, #FF6B9D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.nav-back {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: 20px; background: rgba(0,87,168,0.06);
  border: 1px solid rgba(0,87,168,0.1); color: rgba(255,255,255,0.75);
  font-size: 0.82rem; font-weight: 800; text-decoration: none; transition: all 0.2s;
}
.nav-back:hover { background: rgba(0,87,168,0.1); color: #1E293B; }
.header-spacer { flex: 1; }

/* CONTAINER */
.wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px; }

/* PROFILE HEADER */
.profile-head { text-align: center; margin-bottom: 28px; }
.avatar-wrap { position: relative; display: inline-block; margin-bottom: 14px; }
.avatar-circle {
  width: 104px; height: 104px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(96,165,250,0.25), rgba(255,107,157,0.15));
  border: 3px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; overflow: hidden;
  box-shadow: 0 0 40px rgba(0,87,168,0.2);
}
.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
.avatar-cam-btn {
  position: absolute; bottom: 2px; right: 2px;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--gold); border: 3px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.95rem; transition: all 0.2s;
}
.avatar-cam-btn:hover { transform: scale(1.1); }
.profile-head h1 {
  font-family: 'Bangers', cursive; font-size: 1.8rem; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--white), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.profile-head .email { color: var(--gray); font-size: 0.9rem; margin-top: 4px; }
.plan-badge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 6px 16px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 900;
}
.plan-badge.free { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
.plan-badge.standard { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3); color: var(--gold); }
.plan-badge.premium { background: rgba(129,140,248,0.15); border: 1px solid rgba(129,140,248,0.4); color: #c490ff; }

/* TABS */
.tabs { display: flex; gap: 8px; background: #FFFFFF; border: 1px solid rgba(0,87,168,0.12); border-radius: 16px; padding: 6px; margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 11px; border-radius: 11px; border: none; cursor: pointer;
  background: transparent; color: var(--gray); font-family: 'Nunito', sans-serif;
  font-size: 0.85rem; font-weight: 800; transition: all 0.2s;
}
.tab-btn.active { background: linear-gradient(135deg, #0057A8, #004494); color: #1E293B; }

/* CARD */
.panel { background: #FFFFFF; border: 1px solid rgba(0,87,168,0.12); border-radius: 20px; padding: 26px; }
.panel h2 { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 1px; margin-bottom: 18px; color: var(--white); }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px;
  text-transform: uppercase; color: var(--gray); margin-bottom: 7px;
}
.field input {
  width: 100%; padding: 13px 16px; background: #FFFFFF;
  border: 1px solid rgba(0,87,168,0.12); border-radius: 12px; color: var(--white);
  font-family: 'Nunito', sans-serif; font-size: 0.92rem; font-weight: 600; outline: none;
  transition: all 0.2s;
}
.field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(0,87,168,0.1); }
.field input:disabled { color: var(--gray); background: rgba(255,255,255,0.02); }
.field-hint { font-size: 0.75rem; color: var(--gray); margin-top: 5px; }

.btn-save {
  width: 100%; padding: 15px; margin-top: 6px;
  background: linear-gradient(135deg, #0057A8, #004494); color: #1E293B;
  font-family: 'Bangers', cursive; font-size: 1.15rem; letter-spacing: 1px;
  border: none; border-radius: 13px; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 0 #002d6b;
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #002d6b; }
.btn-save:active { transform: translateY(0); }

.msg { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 0.85rem; font-weight: 700; display: none; }
.msg.show { display: block; }
.msg.ok { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
.msg.err { background: rgba(255,107,157,0.1); border: 1px solid rgba(255,107,157,0.3); color: var(--red); }

/* SUBSCRIPTION CARD */
.sub-active {
  background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(255,107,157,0.08));
  border: 1px solid rgba(96,165,250,0.25);
  border-radius: 20px; padding: 26px;
}
.sub-active .sub-icon { font-size: 2.4rem; margin-bottom: 8px; }
.sub-active h2 { font-family: 'Bangers', cursive; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 16px; }
.sub-row {
  background: rgba(0,87,168,0.06); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.sub-row .sr-label { font-size: 0.72rem; color: var(--gray); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.sub-row .sr-val { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 900; color: var(--white); }
.btn-cancel {
  width: 100%; margin-top: 8px; padding: 12px; border-radius: 12px;
  background: rgba(0,87,168,0.06); border: 1px solid rgba(0,87,168,0.12);
  color: var(--text); font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { background: rgba(255,107,157,0.1); border-color: rgba(255,107,157,0.3); color: var(--red); }

.sub-free { text-align: center; background: #FFFFFF; border: 1px solid rgba(0,87,168,0.12); border-radius: 20px; padding: 36px 26px; }
.sub-free .sf-icon { font-size: 3rem; margin-bottom: 10px; }
.sub-free h2 { font-family: 'Bangers', cursive; font-size: 1.3rem; margin-bottom: 8px; }
.sub-free p { color: var(--gray); font-size: 0.88rem; margin-bottom: 20px; line-height: 1.5; }
.btn-upgrade {
  display: block; width: 100%; padding: 15px; text-align: center; text-decoration: none;
  background: linear-gradient(135deg, #0057A8, #004494); color: #1E293B;
  font-family: 'Bangers', cursive; font-size: 1.15rem; letter-spacing: 1px;
  border-radius: 13px; box-shadow: 0 4px 0 #002d6b; transition: all 0.2s;
}
.btn-upgrade:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #002d6b; }

.danger-zone { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.danger-zone h3 { font-size: 0.78rem; font-weight: 900; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.btn-logout {
  width: 100%; padding: 13px; border-radius: 12px; cursor: pointer;
  background: rgba(255,107,157,0.08); border: 1px solid rgba(255,107,157,0.25);
  color: var(--red); font-weight: 800; font-size: 0.85rem; transition: all 0.2s;
}
.btn-logout:hover { background: rgba(255,107,157,0.15); }
</style>
</head>
<body>

<header class="top-header">
  <a class="nav-back" href="home.html">← Home</a>
  <a class="header-logo" href="index.html">Road to Japan</a>
  <div class="header-spacer"></div>
</header>

<div class="wrap">

  <!-- PROFILE HEADER -->
  <div class="profile-head">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatarCircle">🦊</div>
      <div class="avatar-cam-btn" onclick="document.getElementById('avatarInput').click()" title="写真を変更">📷</div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarSelect(event)">
    </div>
    <h1 id="profileHeadName">ADVENTURER</h1>
    <div class="email" id="profileHeadEmail">—</div>
    <div class="plan-badge free" id="profilePlanBadge">🌱 Free Plan</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tabBtnProfile" onclick="switchTab('profile')">👤 Profile</button>
    <button class="tab-btn" id="tabBtnPassword" onclick="switchTab('password')">🔑 Password</button>
    <button class="tab-btn" id="tabBtnSub" onclick="switchTab('subscription')">✨ Subscription</button>
  </div>

  <div class="msg" id="msgBox"></div>

  <!-- PROFILE TAB -->
  <div id="tabProfile">
    <div class="panel">
      <h2>Edit Profile</h2>
      <div class="field">
        <label>Hero Name</label>
        <input type="text" id="inputName" maxlength="16" placeholder="KAI">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="inputEmail" disabled>
        <div class="field-hint">Email cannot be changed in this demo.</div>
      </div>
      <div class="field">
        <label>Japanese Level</label>
        <input type="text" id="inputLevel" disabled>
      </div>
      <button class="btn-save" onclick="saveProfile()">💾 Save Changes</button>
    </div>
  </div>

  <!-- PASSWORD TAB -->
  <div id="tabPassword" style="display:none">
    <div class="panel">
      <h2>Change Password</h2>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="inputNewPw" placeholder="8+ characters" minlength="8">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="inputConfirmPw" placeholder="Re-enter password">
      </div>
      <button class="btn-save" onclick="savePassword()">🔑 Update Password</button>
    </div>
  </div>

  <!-- SUBSCRIPTION TAB -->
  <div id="tabSubscription" style="display:none">
    <div id="subContent"></div>

    <div class="danger-zone">
      <h3>Account</h3>
      <button class="btn-logout" onclick="logoutAccount()">🚪 Sign Out</button>
    </div>
  </div>

</div>

<script>
function getProfile() {
  return JSON.parse(localStorage.getItem('rtj_profile') || '{}');
}
function saveProfileObj(p) {
  localStorage.setItem('rtj_profile', JSON.stringify(p));
}
function showMsg(text, ok) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(() => box.classList.remove('show'), 3000);
}

const PLAN_INFO = {
  free:    { emoji: '🌱', label: 'Free Plan',    price: '$0',       class: 'free' },
  premium: { emoji: '👑', label: 'Premium Plan', price: '$9.99/mo', class: 'premium' },
  annual:  { emoji: '🏆', label: 'Annual Plan',  price: '$79/yr',   class: 'premium' },
};

const LEVEL_LABELS = {
  zero: 'Complete Beginner',
  kana: 'Kana Level',
  kanji: 'Kanji Warrior',
  advanced: 'Advanced',
};

function renderPage() {
  const p = getProfile();
  const name = p.name || 'ADVENTURER';
  const plan = PLAN_INFO[p.plan] ? p.plan : 'free';
  const info = PLAN_INFO[plan];

  // Header
  document.getElementById('profileHeadName').textContent = name;
  document.getElementById('profileHeadEmail').textContent = p.email || 'No email on file';
  const badge = document.getElementById('profilePlanBadge');
  badge.textContent = `${info.emoji} ${info.label}`;
  badge.className = 'plan-badge ' + info.class;

  // Avatar
  const avatarEl = document.getElementById('avatarCircle');
  if (p.avatar) {
    avatarEl.innerHTML = `<img src="${p.avatar}" alt="avatar">`;
  } else {
    avatarEl.textContent = '🦊';
  }

  // Profile form
  document.getElementById('inputName').value = name;
  document.getElementById('inputEmail').value = p.email || '';
  document.getElementById('inputLevel').value = LEVEL_LABELS[p.level] || 'Not set';

  // Subscription panel
  const subContent = document.getElementById('subContent');
  if (plan !== 'free') {
    subContent.innerHTML = `
      <div class="sub-active">
        <div class="sub-icon">${info.emoji}</div>
        <h2>${info.label} — Active</h2>
        <div class="sub-row">
          <div class="sr-label">📅 Member Since</div>
          <div class="sr-val">${p.joinDate || '—'}</div>
        </div>
        <div class="sub-row">
          <div class="sr-label">💳 Monthly Price</div>
          <div class="sr-val">${info.price}</div>
        </div>
        <div class="sub-row">
          <div class="sr-label">🔄 Status</div>
          <div class="sr-val" style="color:var(--green)">Active (Demo)</div>
        </div>
        <button class="btn-cancel" onclick="cancelSubscription()">Cancel Subscription</button>
      </div>`;
  } else {
    subContent.innerHTML = `
      <div class="sub-free">
        <div class="sf-icon">🚀</div>
        <h2>You're on the Free Plan</h2>
        <p>Upgrade to unlock all 1,006 Kanji, the full Culture Hub, unlimited lessons, and more!</p>
        <a class="btn-upgrade" href="payment.html">⚔️ Upgrade Now</a>
      </div>`;
  }
}

function switchTab(tab) {
  ['profile','password','subscription'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? '' : 'none';
    document.getElementById('tabBtn' + (t === 'subscription' ? 'Sub' : t.charAt(0).toUpperCase() + t.slice(1))).classList.toggle('active', t === tab);
  });
}

function handleAvatarSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const p = getProfile();
    p.avatar = ev.target.result; // base64 data URL — stored locally, no backend in this demo
    saveProfileObj(p);
    document.getElementById('avatarCircle').innerHTML = `<img src="${p.avatar}" alt="avatar">`;
    showMsg('✅ Profile photo updated!', true);
  };
  reader.readAsDataURL(file);
}

function saveProfile() {
  const name = document.getElementById('inputName').value.trim().toUpperCase();
  if (!name) { showMsg('❌ Hero name cannot be empty.', false); return; }
  const p = getProfile();
  p.name = name;
  saveProfileObj(p);
  showMsg('✅ Profile saved!', true);
  renderPage();
}

function savePassword() {
  const pw = document.getElementById('inputNewPw').value;
  const pwc = document.getElementById('inputConfirmPw').value;
  if (pw.length < 8) { showMsg('❌ Password must be at least 8 characters.', false); return; }
  if (pw !== pwc) { showMsg('❌ Passwords do not match.', false); return; }
  // Demo only — no real backend auth, so we just simulate success.
  document.getElementById('inputNewPw').value = '';
  document.getElementById('inputConfirmPw').value = '';
  showMsg('✅ Password updated! (demo mode — not persisted to a server)', true);
}

async function cancelSubscription() {
  if (!confirm('Cancel your subscription?\n\nYou will keep Premium access until the end of your current billing period, then be downgraded to the Free Plan.')) return;

  showMsg('⏳ Cancelling subscription...', true);

  try {
    const session = await RTJAuth.getSession();
    if (!session) { showMsg('Please sign in to cancel.', false); return; }

    const res = await fetch('https://bskvxjlbywangxdiqhfi.supabase.co/functions/v1/cancel-subscription', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Cancellation failed');

    /* Update localStorage */
    const p = getProfile();
    p.plan = 'free';
    p.billingCycle = null;
    p.premiumRenew = null;
    saveProfileObj(p);
    renderPage();

    const cancelDate = data.cancelDate
      ? new Date(data.cancelDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
      : '';
    showMsg(`✅ Subscription cancelled. Premium access continues until ${cancelDate}.`, true);

  } catch (e) {
    console.error('[cancelSubscription]', e);
    showMsg(`❌ ${e.message}`, false);
  }
}

async function logoutAccount() {
  if (window.RTJAuth) await RTJAuth.signOut().catch(() => {});
  window.location.href = 'auth.html';
}

renderPage();
</script>

</body>
</html>
