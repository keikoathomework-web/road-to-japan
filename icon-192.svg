<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#FFF5F8"/>
  <!-- Pink gradient background -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8FAB"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </radialGradient>
  </defs>
  <circle cx="96" cy="96" r="90" fill="url(#bg)"/>
  <!-- Torii gate (鳥居) -->
  <rect x="58" y="118" width="76" height="8" rx="4" fill="white" opacity="0.95"/>
  <rect x="55" y="104" width="82" height="8" rx="4" fill="white"/>
  <rect x="67" y="112" width="10" height="38" rx="5" fill="white" opacity="0.95"/>
  <rect x="115" y="112" width="10" height="38" rx="5" fill="white" opacity="0.95"/>
  <!-- Curved roof lines -->
  <path d="M55 108 Q96 88 137 108" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Japanese text あ -->
  <text x="96" y="90" text-anchor="middle" font-family="serif" font-size="38" font-weight="bold" fill="white" opacity="0.9">あ</text>
  <!-- Sakura petals -->
  <text x="28" y="55" font-size="18" fill="white" opacity="0.7">🌸</text>
  <text x="145" y="48" font-size="14" fill="white" opacity="0.65">🌸</text>
  <text x="155" y="145" font-size="12" fill="white" opacity="0.5">🌸</text>
  <text x="22" y="148" font-size="10" fill="white" opacity="0.45">🌸</text>
</svg>
