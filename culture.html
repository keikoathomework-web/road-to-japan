<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to Japan — Culture Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2230;
  --gold: #ffd700; --gold2: #ffaa00;
  --cyan: #00e5ff; --green: #00e676; --red: #ff3a5c;
  --purple: #a855f7; --orange: #ff6b2b; --pink: #ff6eb4;
  --teal: #00bfa5; --blue: #2979ff;
  --white: #fff; --gray: #7a8099; --text: #d0d4e8;
  --border: rgba(255,255,255,0.07);
}
html, body { min-height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }

/* ── NAV ── */
.top-nav {
  position: sticky; top: 0; z-index: 100; height: 56px;
  display: flex; align-items: center; gap: 12px; padding: 0 20px;
  background: rgba(13,17,23,0.97); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-back { display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);color:rgba(255,255,255,0.75);font-size:0.82rem;font-weight:800;text-decoration:none;transition:all 0.2s; }
.nav-back:hover { background:rgba(255,255,255,0.1);color:#fff; }
.nav-logo { font-family:'Bangers',cursive;font-size:1.15rem;letter-spacing:3px;background:linear-gradient(90deg,#ff6b2b,#ff6eb4,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.nav-spacer { flex:1; }
.nav-xp { padding:6px 14px;border-radius:20px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);font-family:'Orbitron',sans-serif;font-size:0.72rem;font-weight:900;color:var(--gold); }

/* ── HERO ── */
.hero {
  position:relative;overflow:hidden;padding:40px 20px 34px;text-align:center;
  background:linear-gradient(160deg,#0a0010 0%,#1a000a 30%,#0a1a0a 70%,#0a0a2a 100%);
  border-bottom:1px solid rgba(255,107,43,0.12);
}
.hero::before {
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,110,180,0.1), transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(168,85,247,0.1), transparent 50%),
    radial-gradient(ellipse at 50% -10%, rgba(255,107,43,0.12), transparent 55%);
}
.hero-floats { position:absolute;inset:0;pointer-events:none;overflow:hidden; }
.hf { position:absolute;font-size:3rem;opacity:0.05;animation:floatUp linear infinite; }
@keyframes floatUp { 0%{transform:translateY(100%) rotate(0deg)} 100%{transform:translateY(-120%) rotate(360deg)} }
.hero-tag { display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;background:rgba(255,107,43,0.12);border:1px solid rgba(255,107,43,0.3);color:var(--orange);font-size:0.68rem;font-weight:900;letter-spacing:1px;margin-bottom:12px;position:relative;z-index:1; }
.hero-title { font-family:'Bangers',cursive;font-size:2.8rem;letter-spacing:4px;color:var(--white);margin-bottom:8px;position:relative;z-index:1;line-height:1; }
.hero-title .grad { background:linear-gradient(90deg,var(--orange),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.hero-sub { font-size:0.88rem;color:var(--text);line-height:1.75;max-width:500px;margin:0 auto 22px;position:relative;z-index:1; }

/* Category pills */
.cat-pills { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1; }
.cat-pill {
  padding:9px 18px;border-radius:24px;font-size:0.8rem;font-weight:900;cursor:pointer;
  border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text);
  transition:all 0.25s;
}
.cat-pill:hover:not(.active) { border-color:rgba(255,255,255,0.2);transform:translateY(-1px); }
.cat-pill.active { color:#000;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.4); }

/* ── PAGE ── */
.page { max-width:920px;margin:0 auto;padding:32px 16px 70px; }

/* ── CATEGORY SECTIONS ── */
.cat-section { display:none; }
.cat-section.active { display:block; }

/* ── SECTION HEADER ── */
.sec-header { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
.sec-icon { font-size:2rem; }
.sec-title { font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:3px;color:var(--white); }
.sec-sub { font-size:0.8rem;color:var(--gray);font-weight:700;margin-top:2px; }
.sec-line { flex:1;height:1px;background:var(--border); }

/* ── CULTURE CARDS ── */
.culture-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px; }
@media(max-width:600px) { .culture-grid { grid-template-columns:1fr; } }
.culture-card {
  border-radius:20px;overflow:hidden;border:1px solid var(--border);
  background:var(--bg2);transition:all 0.3s;cursor:default;
}
.culture-card:hover { transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.15); }

/* Illustration header */
.cc-illus {
  height:130px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.cc-illus-bg { position:absolute;inset:0; }
.cc-emoji-main { font-size:4rem;position:relative;z-index:2;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));animation:ccFloat 3s ease-in-out infinite alternate; }
@keyframes ccFloat { from{transform:translateY(0) scale(1)} to{transform:translateY(-8px) scale(1.05)} }
.cc-deco { position:absolute;z-index:1;font-size:1.8rem;opacity:0.5; }
.cc-body { padding:16px; }
.cc-title { font-family:'Bangers',cursive;font-size:1.15rem;letter-spacing:2px;color:var(--white);margin-bottom:4px; }
.cc-sub { font-size:0.7rem;font-weight:900;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px; }
.cc-desc { font-size:0.8rem;line-height:1.7;color:var(--text);margin-bottom:12px; }
.cc-fact { display:flex;gap:8px;align-items:flex-start;background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05); }
.cc-fact-icon { font-size:1rem;flex-shrink:0; }
.cc-fact-text { font-size:0.73rem;line-height:1.6;color:var(--text); }

/* Vocab chips in cards */
.cc-vocab { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px; }
.vc { display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.2s; }
.vc:hover { background:rgba(255,255,255,0.08);transform:scale(1.03); }
.vc-jp { font-size:0.88rem;font-weight:900;color:var(--white); }
.vc-rom { font-size:0.62rem;font-weight:900; }
.vc-en { font-size:0.62rem;color:var(--gray); }
.cc-readmore { display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-size:0.75rem;font-weight:900;color:var(--text);cursor:pointer;transition:all 0.2s; }
.cc-readmore:hover { background:rgba(255,255,255,0.1); }

/* ── FEATURE ARTICLE (wide card) ── */
.feature-card {
  border-radius:20px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);
  margin-bottom:20px;display:grid;grid-template-columns:200px 1fr;
  transition:all 0.3s;
}
@media(max-width:580px) { .feature-card { grid-template-columns:1fr; } }
.feature-card:hover { transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.15); }
.fc-illus { display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:160px; }
.fc-illus-bg { position:absolute;inset:0; }
.fc-emoji { font-size:5rem;position:relative;z-index:2;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
.fc-body { padding:20px; }
.fc-tag { display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.62rem;font-weight:900;letter-spacing:1px;margin-bottom:8px; }
.fc-title { font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:2px;color:var(--white);margin-bottom:6px; }
.fc-desc { font-size:0.82rem;line-height:1.75;color:var(--text);margin-bottom:12px; }
.fc-vocab { display:flex;flex-wrap:wrap;gap:5px; }

/* ── QUIZ BANNER ── */
.quiz-banner {
  border-radius:20px;padding:22px;margin:24px 0;
  display:flex;align-items:center;gap:16px;
  background:linear-gradient(135deg,#1a0d30,#0d0d1a,#0d1a10);
  border:1px solid rgba(168,85,247,0.2);
  cursor:pointer;transition:all 0.25s;
}
.quiz-banner:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.5);border-color:rgba(168,85,247,0.4); }
.qb-icon { font-size:2.5rem;flex-shrink:0; }
.qb-title { font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:2px;color:var(--purple);margin-bottom:3px; }
.qb-sub { font-size:0.78rem;color:var(--text); }
.qb-btn { margin-left:auto;padding:10px 20px;border-radius:12px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.35);color:var(--purple);font-size:0.82rem;font-weight:900;white-space:nowrap;transition:all 0.2s; }
.quiz-banner:hover .qb-btn { background:rgba(168,85,247,0.25); }

/* ── CULTURE QUIZ MODAL ── */
.quiz-modal {
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.quiz-modal.open { opacity:1;pointer-events:all; }
.quiz-modal-inner {
  background:var(--bg2);border:1px solid rgba(168,85,247,0.25);border-radius:24px;
  padding:28px 24px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;
  transform:scale(0.92);transition:transform 0.3s cubic-bezier(0.34,1.5,0.64,1);
}
.quiz-modal.open .quiz-modal-inner { transform:scale(1); }
.qm-title { font-family:'Bangers',cursive;font-size:1.6rem;letter-spacing:3px;color:var(--purple);margin-bottom:4px; }
.qm-progress { font-size:0.7rem;color:var(--gray);margin-bottom:16px;font-weight:900; }
.qm-q { font-size:0.95rem;font-weight:900;color:var(--white);margin-bottom:6px;line-height:1.55; }
.qm-jp { font-size:1.6rem;color:var(--white);margin-bottom:10px; }
.qm-opts { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px; }
@media(max-width:400px) { .qm-opts { grid-template-columns:1fr; } }
.qm-opt { padding:11px 12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);color:var(--text);font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;text-align:left; }
.qm-opt:hover:not(:disabled) { background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.35); }
.qm-opt.correct { background:rgba(0,230,118,0.12);border-color:rgba(0,230,118,0.4);color:var(--green); }
.qm-opt.wrong { background:rgba(255,58,92,0.1);border-color:rgba(255,58,92,0.35);color:var(--red); }
.qm-feedback { padding:10px 14px;border-radius:10px;font-size:0.8rem;font-weight:800;display:none;margin-bottom:10px; }
.qm-feedback.show { display:block; }
.qm-feedback.correct { background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);color:var(--green); }
.qm-feedback.wrong { background:rgba(255,58,92,0.08);border:1px solid rgba(255,58,92,0.2);color:var(--red); }
.qm-next { padding:10px 20px;border-radius:12px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:var(--purple);font-size:0.82rem;font-weight:900;cursor:pointer;display:none; }
.qm-result { text-align:center;padding:16px 0; }
.qmr-score { font-family:'Bangers',cursive;font-size:3rem;letter-spacing:3px;color:var(--gold);margin-bottom:6px; }
.qmr-msg { font-size:0.88rem;color:var(--text);margin-bottom:16px; }
.qmr-close { padding:11px 24px;border-radius:12px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;font-size:0.88rem;font-weight:900;cursor:pointer;border:none; }

/* ── VOCAB TOOLTIP ── */
.vtt { position:fixed;z-index:300;background:var(--bg3);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity 0.2s;max-width:200px;box-shadow:0 8px 24px rgba(0,0,0,0.6); }
.vtt.show { opacity:1; }
.vtt-jp { font-size:1.2rem;font-weight:900;color:var(--white);margin-bottom:3px; }
.vtt-rom { font-size:0.75rem;font-weight:900;color:var(--teal); }
.vtt-en { font-size:0.75rem;color:var(--text);margin-top:2px; }

/* ── ANIMATIONS ── */
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.reveal { opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s; }
.reveal.visible { opacity:1;transform:none; }
</style>
<script src="gojuon-widget.js"></script>
</head>
<body>

<!-- NAV -->
<div class="top-nav">
  <a class="nav-back" href="home.html">← Home</a>
  <div class="nav-logo">🎌 CULTURE HUB</div>
  <div class="nav-spacer"></div>
  <div class="nav-xp" id="xpDisplay">0 XP</div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-floats" id="heroFloats"></div>
  <div class="hero-tag">🎌 Month 9 · Culture</div>
  <div class="hero-title">DISCOVER<br><span class="grad">JAPAN'S SOUL</span></div>
  <div class="hero-sub">Language is just the beginning. Dive into anime 🎬, ramen 🍜, sakura 🌸, samurai ⚔️, and everything that makes Japan one of the world's most fascinating cultures!</div>

</div>

<div class="page" id="mainPage"></div>

<!-- QUIZ MODAL -->
<div class="quiz-modal" id="quizModal" onclick="if(event.target===this)closeQuiz()">
  <div class="quiz-modal-inner">
    <div class="qm-title">🧠 CULTURE QUIZ</div>
    <div class="qm-progress" id="qmProgress">Question 1 / 10</div>
    <div id="qmBody"></div>
  </div>
</div>

<!-- VOCAB TOOLTIP -->
<div class="vtt" id="vtt">
  <div class="vtt-jp" id="vtt-jp"></div>
  <div class="vtt-rom" id="vtt-rom"></div>
  <div class="vtt-en" id="vtt-en"></div>
</div>

<script>

const CATS = [

        title:'MOUNTAINS & VOLCANOES', sub:'The islands of fire',

        fact:'Japanese engineers have developed earthquake-resistant technology so advanced that Tokyo\'s Tokyo Skytree (634m — the world\'s tallest broadcast tower) has a "seismic isolation system" that allows it to sway up to 1 meter in an earthquake — and still be perfectly safe! ⚡',
        vocab:[{jp:'火山',rom:'Kazan',en:'Volcano 🌋',c:'#ff6b2b'},{jp:'地震',rom:'Jishin',en:'Earthquake 🌎',c:'#ff6b2b'},{jp:'島',rom:'Shima',en:'Island 🏝️',c:'#00e5ff'}],
      },
      {
        emoji:'♨️', bg:['#0a1a1a','#051010'],
        decos:[{e:'🌊',t:'10%',r:'10%'},{e:'🌿',b:'20%',l:'15%'}],
        title:'ONSEN HOT SPRINGS', sub:'Bathing in volcanic warmth',
        desc:'Japan has over 27,000 hot spring sources (温泉 onsen)! ♨️ Volcanic activity heats underground water which rises naturally. Hot spring bathing is a beloved national tradition. "Rotenburo" (露天風呂) are outdoor baths — imagine soaking in a natural pool while surrounded by snowy mountains or autumn forests! 🏔️ Japan\'s famous Snow Monkeys even bathe in hot springs! 🐒',
        fact:'The Beppu hot springs in Kyushu produce more hot spring water than any place on earth except Yellowstone National Park. The "Hells of Beppu" (別府地獄) are 8 spectacular hot springs in brilliant colors — blood red, bright blue, and even one where crocodiles live in the hot water! 🐊',
        vocab:[{jp:'温泉',rom:'Onsen',en:'Hot spring ♨️',c:'#00e5ff'},{jp:'湯',rom:'Yu',en:'Hot water / Bath 🛁',c:'#00e5ff'},{jp:'リラックス',rom:'Rirakkusu',en:'Relax 😌',c:'#00e676'}],
      },
    ],
  },
};

// ── QUIZ DATA ──
const QUIZ_QUESTIONS = [
  { cat:'anime', q:'What does "kawaii" (かわいい) mean?', jp:'かわいい！', opts:['Scary','Delicious','Cute!','Strong'], ans:'Cute!' , exp:'✅ かわいい (kawaii) means "cute!" — one of Japan\'s most famous words worldwide!' },
  { cat:'anime', q:'What company created Mario and Pokemon?', jp:'任天堂', opts:['Sony','Nintendo','Sega','Capcom'], ans:'Nintendo', exp:'✅ 任天堂 (Nintendo) means "leave luck to heaven" — and they certainly found it with Mario! 🍄' },
  { cat:'food', q:'What does "itadakimasu" mean?', jp:'いただきます', opts:['Goodbye','Let\'s eat!','Thank you','Goodnight'], ans:'Let\'s eat!', exp:'✅ いただきます is said before every meal — it means "I humbly receive (this food)"! 🍱' },
  { cat:'food', q:'Which ramen style uses pork bone broth?', jp:'とんこつ', opts:['みそ (miso)','しょうゆ (soy sauce)','とんこつ (tonkotsu)','しお (salt)'], ans:'とんこつ (tonkotsu)', exp:'✅ 豚骨 (tonkotsu) = pork bone broth — the rich creamy style from Kyushu! 🐷' },
  { cat:'festivals', q:'What is "hanabi" (花火)?', jp:'花火', opts:['Cherry blossom','Flower vase','Fireworks','Bonfire'], ans:'Fireworks', exp:'✅ 花火 means "flower fire" — 花 (hana = flower) + 火 (hi = fire). What a beautiful word for fireworks! 🎆' },
  { cat:'festivals', q:'Hanami is the tradition of viewing what?', jp:'花見', opts:['Autumn leaves','Cherry blossoms','Fireworks','Snow'], ans:'Cherry blossoms', exp:'✅ 花見 (hanami) = flower viewing — specifically sakura (cherry blossoms) in spring! 🌸' },
  { cat:'tradition', q:'What is "bushido" (武士道)?', jp:'武士道', opts:['Tea ceremony','Way of the warrior','Art of cooking','Ninja training'], ans:'Way of the warrior', exp:'✅ 武士道 (bushidō) = "Way of the Warrior" — the samurai\'s code of honor, loyalty, and courage! ⚔️' },
  { cat:'tradition', q:'What does "origami" mean literally?', jp:'折り紙', opts:['Paper painting','Folding paper','Paper cutting','Paper art'], ans:'Folding paper', exp:'✅ 折り紙 (origami) = 折り (ori = fold) + 紙 (kami = paper). Just folding — no scissors or glue! 🕊️' },
  { cat:'pop', q:'What does "karaoke" mean literally?', jp:'カラオケ', opts:['Sing loudly','Empty orchestra','Happy music','Evening song'], ans:'Empty orchestra', exp:'✅ カラオケ = 空 (kara = empty) + オーケストラ (ōkesutora = orchestra). You provide the voice! 🎤' },
  { cat:'nature', q:'What is "kōyō" (紅葉)?', jp:'紅葉', opts:['Cherry blossoms','Snow viewing','Autumn leaf viewing','Star gazing'], ans:'Autumn leaf viewing', exp:'✅ 紅葉 (kōyō) is autumn leaf viewing — Japan\'s stunning red and gold mountains in fall! 🍂' },
];

let currentCat = 'anime';
let sessionXP = 0;
let quizState = { current: 0, correct: 0, done: false, questions: [] };

// ── BUILD HERO FLOATS ──
function buildFloats() {
  const emojis = ['🌸','🍜','🎌','⛩️','🎮','🍡','🏯','🎋','🌺','🎆','🎎','🍵','⚔️','🎤','🏔️'];
  const el = document.getElementById('heroFloats');
  emojis.forEach((e, i) => {
    const d = document.createElement('div');
    d.className = 'hf';
    d.textContent = e;
    d.style.left = (Math.random() * 100) + '%';
    d.style.animationDuration = (8 + Math.random() * 12) + 's';
    d.style.animationDelay = (-Math.random() * 12) + 's';
    d.style.fontSize = (2 + Math.random() * 2) + 'rem';
    el.appendChild(d);
  });
}

// ── BUILD CATEGORY PILLS ──
function buildPills() {
  document.getElementById('catPills').innerHTML = CATS.map(c => `
    <div class="cat-pill ${c.id===currentCat?'active':''}" id="pill-${c.id}"
      onclick="setCategory('${c.id}')"
      style="${c.id===currentCat?`background:${c.color};border-color:${c.color};`:''}">
      ${c.label}
    </div>
  `).join('');
}

// ── SET CATEGORY ──
function setCategory(id) {
  currentCat = id;
  buildPills();
  buildPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── BUILD FULL PAGE FOR CATEGORY ──
function buildPage() {
  const data = CONTENT[currentCat];
  const cat  = CATS.find(c => c.id === currentCat);
  if (!data || !cat) return;

  const { feature, cards } = data;

  const featureHtml = `
    <div class="feature-card reveal" style="border-color:${cat.color}22">
      <div class="fc-illus" style="background:linear-gradient(135deg,${feature.bg[0]},${feature.bg[1]})">
        <div class="fc-illus-bg"></div>
        <div class="fc-emoji">${feature.emoji}</div>
      </div>
      <div class="fc-body">
        <div class="fc-tag" style="background:${cat.color}22;border:1px solid ${cat.color}44;color:${cat.color}">${feature.tag.text}</div>
        <div class="fc-title">${feature.title}</div>
        <div class="fc-desc" style="margin-bottom:12px">${feature.desc}</div>
        <div class="fc-vocab">
          ${feature.vocab.map(v => buildVcChip(v.jp, v.rom, v.en, v.color)).join('')}
        </div>
      </div>
    </div>
  `;

  const cardsHtml = `
    <div class="sec-header reveal">
      <div class="sec-icon">${cat.label.split(' ')[0]}</div>
      <div>
        <div class="sec-title" style="color:${cat.color}">${cat.label.slice(3)}</div>
        <div class="sec-sub">Tap vocabulary chips to hear pronunciation · Learn Japanese through culture!</div>
      </div>
      <div class="sec-line"></div>
    </div>
    <div class="culture-grid">
      ${cards.map(card => buildCultureCard(card, cat.color)).join('')}
    </div>
  `;

  const quizHtml = `
    <div class="quiz-banner reveal" onclick="openQuiz('${currentCat}')">
      <div class="qb-icon">🧠</div>
      <div>
        <div class="qb-title">CULTURE QUIZ</div>
        <div class="qb-sub">Test what you learned about ${cat.label.slice(3)}! Win XP and unlock your culture knowledge! 🏆</div>
      </div>
      <div class="qb-btn">Start Quiz →</div>
    </div>
  `;

  document.getElementById('mainPage').innerHTML = featureHtml + cardsHtml + quizHtml;

  // Observe reveals
  document.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transitionDelay = `${i * 0.06}s`;
    observer.observe(el);
  });

  // Attach vocab chip events
  document.querySelectorAll('.vc').forEach(chip => {
    chip.addEventListener('mouseenter', (e) => showTooltip(chip, e));
    chip.addEventListener('mouseleave', hideTooltip);
    chip.addEventListener('click', () => speakJP(chip.dataset.jp));
  });
}

function buildVcChip(jp, rom, en, color) {
  return `<div class="vc" data-jp="${jp}" data-rom="${rom}" data-en="${en}" style="border-color:${color}33" onclick="speakJP('${jp}')">
    <span class="vc-jp" style="color:${color}">${jp}</span>
    <span class="vc-rom" style="color:${color}">${rom}</span>
    <span class="vc-en">${en}</span>
  </div>`;
}

function buildCultureCard(card, accent) {
  const decos = (card.decos||[]).map(d => {
    const s = [d.t?`top:${d.t}`:'', d.b?`bottom:${d.b}`:'', d.l?`left:${d.l}`:'', d.r?`right:${d.r}`:''].filter(Boolean).join(';');
    return `<div class="cc-deco" style="${s}">${d.e}</div>`;
  }).join('');

  const vocabChips = (card.vocab||[]).map(v => buildVcChip(v.jp, v.rom, v.en, v.c||accent)).join('');

  return `
    <div class="culture-card reveal">
      <div class="cc-illus" style="background:linear-gradient(135deg,${card.bg[0]},${card.bg[1]})">
        <div class="cc-illus-bg"></div>
        ${decos}
        <div class="cc-emoji-main">${card.emoji}</div>
      </div>
      <div class="cc-body">
        <div class="cc-title">${card.title}</div>
        <div class="cc-sub">${card.sub}</div>
        <div class="cc-desc">${card.desc}</div>
        <div class="cc-fact"><div class="cc-fact-icon">💡</div><div class="cc-fact-text">${card.fact}</div></div>
        <div class="cc-vocab">${vocabChips}</div>
      </div>
    </div>
  `;
}

// ── QUIZ ──
function openQuiz(catId) {
  const qs = QUIZ_QUESTIONS.filter(q => q.cat === catId || Math.random() > 0.5).slice(0, 5);
  // Always include at least 2 from the current category
  const catQs = QUIZ_QUESTIONS.filter(q => q.cat === catId);
  const mixed  = [...catQs.slice(0,3), ...QUIZ_QUESTIONS.filter(q => q.cat !== catId).slice(0,2)];
  mixed.sort(() => Math.random() - 0.5);

  quizState = { current: 0, correct: 0, done: false, questions: mixed.slice(0,5) };
  document.getElementById('quizModal').classList.add('open');
  renderQuizQ();
}

function closeQuiz() {
  document.getElementById('quizModal').classList.remove('open');
}

function renderQuizQ() {
  const { current, done, questions } = quizState;
  document.getElementById('qmProgress').textContent = `Question ${current+1} / ${questions.length}`;

  if (done) {
    const s = quizState.correct, t = questions.length;
    const pct = Math.round(s/t*100);
    document.getElementById('qmBody').innerHTML = `
      <div class="qm-result">
        <div style="font-size:3rem;margin-bottom:10px">${pct===100?'🏆':pct>=60?'🌟':'💪'}</div>
        <div class="qmr-score">${s} / ${t}</div>
        <div class="qmr-msg">${pct===100?'Perfect! You\'re a Japan culture expert! 🎌':pct>=60?'Great work! Keep exploring Japan! 🌸':'Keep reading — Japan has so much to discover! 📚'}</div>
        <button class="qmr-close" onclick="closeQuiz()">Back to Culture Hub 🎌</button>
      </div>
    `;
    return;
  }

  const q = questions[current];
  document.getElementById('qmBody').innerHTML = `
    <div class="qm-q">${q.q}</div>
    <div class="qm-jp">${q.jp}</div>
    <div class="qm-opts">
      ${q.opts.map(o => `<button class="qm-opt" onclick="answerQuiz('${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
    </div>
    <div class="qm-feedback" id="qmFb"></div>
    <button class="qm-next" id="qmNext" onclick="nextQuizQ()">${current < questions.length-1 ? 'Next →' : 'See Results 🏆'}</button>
  `;
}

function answerQuiz(answer, btn) {
  const q = quizState.questions[quizState.current];
  const correct = answer === q.ans;
  document.querySelectorAll('.qm-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.ans) b.classList.add('correct');
  });
  if (correct) { btn.classList.add('correct'); quizState.correct++; addXP(25); }
  else { btn.classList.add('wrong'); }
  const fb = document.getElementById('qmFb');
  fb.textContent = q.exp;
  fb.className = 'qm-feedback show ' + (correct ? 'correct' : 'wrong');
  document.getElementById('qmNext').style.display = 'inline-block';
}

function nextQuizQ() {
  quizState.current++;
  if (quizState.current >= quizState.questions.length) quizState.done = true;
  renderQuizQ();
}

// ── VOCAB TOOLTIP ──
function showTooltip(chip, e) {
  const tt = document.getElementById('vtt');
  document.getElementById('vtt-jp').textContent  = chip.dataset.jp;
  document.getElementById('vtt-rom').textContent = chip.dataset.rom;
  document.getElementById('vtt-en').textContent  = chip.dataset.en;
  tt.className = 'vtt show';
  const r = chip.getBoundingClientRect();
  tt.style.left = Math.min(r.left, window.innerWidth-220) + 'px';
  tt.style.top  = (r.bottom + 8 + window.scrollY) + 'px';
}
function hideTooltip() { document.getElementById('vtt').className = 'vtt'; }

// ── SPEECH ──
function speakJP(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
  addXP(2);
}

// ── XP ──
function addXP(n) {
  sessionXP += n;
  document.getElementById('xpDisplay').textContent = sessionXP + ' XP';
}

// ── INTERSECTION OBSERVER ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.05 });

// ── INIT ──
window.addEventListener('load', () => {
  buildFloats();
  buildPills();
  buildPage();
});
</script>
</body>
</html>
